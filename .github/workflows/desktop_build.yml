name: Desktop Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  analyze:
    name: Analyse & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Pub get
        run: flutter pub get

      - name: Code generation (drift, riverpod)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyse
        run: flutter analyze

      - name: Test
        run: flutter test

  build-linux:
    name: Build Linux Release
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Code generation (drift, riverpod)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Build Linux release
        run: flutter build linux --release

      - name: Package Linux bundle
        run: zip -r planer-linux.zip build/linux/x64/release/bundle

      - name: Upload Linux bundle
        uses: actions/upload-artifact@v4
        with:
          name: planer-linux-bundle
          path: planer-linux.zip

  build-windows:
    name: Build Windows Release
    runs-on: windows-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Code generation (drift, riverpod)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Build Windows release
        run: flutter build windows --release

      - name: Package Windows bundle
        run: powershell -Command "Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath planer-windows.zip"

      - name: Upload Windows bundle
        uses: actions/upload-artifact@v4
        with:
          name: planer-windows-bundle
          path: planer-windows.zip

  build-macos:
    name: Build macOS Release
    runs-on: macos-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Code generation (drift, riverpod)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Build macOS release
        run: flutter build macos --release

      - name: Package macOS bundle
        run: zip -r planer-macos.zip build/macos/Build/Products/Release/Runner.app

      - name: Upload macOS bundle
        uses: actions/upload-artifact@v4
        with:
          name: planer-macos-bundle
          path: planer-macos.zip
