name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze:
    name: Analyse, Codegen, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Pub get
        run: flutter pub get

      - name: Code-Generierung (drift, riverpod)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyse
        run: flutter analyze

      - name: Test
        run: flutter test

  build-android:
    name: Android APK Build
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build apk --debug

      - uses: actions/upload-artifact@v4
        with:
          name: produktion-planer-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14
