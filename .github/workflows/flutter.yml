name: Flutter CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  analyze:
    name: Analyse, Codegen, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Flutter version
        run: flutter --version
      - name: Pub get
        run: flutter pub get
      - name: Code-Generierung (drift, riverpod)
        run: dart run build_runner build --delete-conflicting-outputs
      - name: Analyse
        run: flutter analyze
      - name: Test
        run: flutter test
