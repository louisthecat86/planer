name: produktion_planer
description: "Produktionsplanungs-Tool für den Fleischbereich. Offline-first mit optionalem Supabase-Sync."
publish_to: 'none'
version: 0.1.0+1
environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  # Datenbank (lokal, offline-first)
  drift: ^2.20.0
  drift_flutter: ^0.2.1
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0
  # Sync-Backend (wird in Phase 6 aktiv genutzt, Schema aber von Anfang an kompatibel)
  supabase_flutter: ^2.5.11
  # Navigation
  go_router: ^14.2.7
  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.0
  collection: ^1.18.0
  excel: ^4.0.6
  file_picker: ^11.0.2
  # Excel-Export (ZIP/XML-Manipulation für Formatierung-erhaltenden Export)
  archive: ^3.6.1
  xml: ^6.5.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  # Code-Generierung
  build_runner: ^2.4.12
  drift_dev: ^2.20.0
  riverpod_generator: ^2.4.3
  custom_lint: ^0.7.6
  riverpod_lint: ^2.3.13
flutter:
  uses-material-design: true